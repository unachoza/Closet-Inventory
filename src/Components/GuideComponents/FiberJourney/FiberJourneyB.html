<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fiber Journey — Option B: Process Chart</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #FAF7F2;
  --warm-white: #FFFDF9;
  --ink: #1C1A17;
  --ink-60: #6B6659;
  --ink-30: #C4BFB5;
  --gold: #B8860B;
  --gold-light: #E8C85A;
  --border: rgba(28,26,23,0.10);
  --border-strong: rgba(28,26,23,0.18);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--cream);
  font-family: 'DM Sans', sans-serif;
  min-height:100vh;
}

/* HEADER */
.page-header {
  background: var(--ink);
  padding: 48px 60px 40px;
  position:relative; overflow:hidden;
}
.page-header::before {
  content:'';position:absolute;inset:0;
  background: repeating-linear-gradient(45deg,transparent,transparent 40px,rgba(184,134,11,.04) 40px,rgba(184,134,11,.04) 41px);
}
.page-header-inner { max-width:1200px;margin:0 auto;position:relative; }
.option-label {
  display:inline-block;background:var(--gold);color:var(--warm-white);
  font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.15em;
  text-transform:uppercase;padding:4px 14px;border-radius:100px;margin-bottom:14px;
}
.page-header h1 {
  font-family:'Playfair Display',serif;
  font-size:clamp(26px,4vw,52px);color:#FFFDF9;font-weight:700;line-height:1.1;
  margin-bottom:10px;
}
.page-header h1 em { font-style:italic;color:var(--gold-light); }
.page-header p { font-size:14px;color:rgba(250,247,242,.55);max-width:520px; }

/* MAIN LAYOUT */
.main-wrap {
  max-width:1200px;
  margin:0 auto;
  padding:64px 60px 80px;
}

/* PHASE ROWS */
.phase-row {
  display:grid;
  grid-template-columns: 80px 1fr;
  gap:0 32px;
  margin-bottom:0;
  position:relative;
}

/* Vertical spine */
.spine-col {
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:0;
}
.spine-number {
  width:52px;height:52px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:'Playfair Display',serif;font-size:22px;font-weight:600;
  color:white;flex-shrink:0;
  position:relative;z-index:2;
  box-shadow:0 4px 16px rgba(28,26,23,.12);
}
.spine-line {
  width:2px;flex:1;min-height:32px;
  background: repeating-linear-gradient(to bottom, var(--border-strong) 0, var(--border-strong) 6px, transparent 6px, transparent 12px);
  margin: 4px 0;
}
.spine-line.last { display:none; }

/* Phase content card */
.phase-card {
  background: var(--warm-white);
  border:1px solid var(--border);
  border-radius:20px;
  margin-bottom:32px;
  overflow:hidden;
  transition:box-shadow .2s;
}
.phase-card:hover { box-shadow:0 4px 28px rgba(28,26,23,.08); }

.phase-card-header {
  display:flex;
  align-items:center;
  gap:20px;
  padding:28px 32px 24px;
  cursor:pointer;
  border-bottom:1px solid var(--border);
  position:relative;
}

.phase-icon-wrap {
  width:56px;height:56px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.phase-icon-svg { display:block; }

.phase-header-text { flex:1; }
.phase-title {
  font-family:'Playfair Display',serif;
  font-size:20px;font-weight:600;color:var(--ink);
  margin-bottom:4px;
}
.phase-summary-short {
  font-size:13px;color:var(--ink-60);line-height:1.5;
}

.expand-btn {
  width:32px;height:32px;border-radius:50%;
  border:1px solid var(--border);
  background:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--ink-60);font-size:14px;
  transition:all .2s;flex-shrink:0;
}
.expand-btn:hover { background:var(--cream); }
.expand-btn.open { transform:rotate(180deg); }

/* Sub-steps grid */
.sub-steps {
  display:none;
  grid-template-columns: repeat(auto-fill, minmax(240px,1fr));
  gap:16px;
  padding:24px 32px 28px;
}
.sub-steps.open { display:grid; }

.step-tile {
  background:var(--cream);
  border:1px solid var(--border);
  border-radius:12px;
  padding:18px 18px 14px;
  position:relative;
}
.step-tile-num {
  font-family:'DM Mono',monospace;
  font-size:9px;letter-spacing:.15em;text-transform:uppercase;
  color:var(--ink-30);margin-bottom:6px;
}
.step-tile-title {
  font-size:13px;font-weight:600;color:var(--ink);
  margin-bottom:8px;line-height:1.35;
}
.step-tile-body {
  font-size:13px;color:var(--ink-60);line-height:1.6;
  margin-bottom:10px;
}
.step-sources { display:flex;flex-wrap:wrap;gap:5px; }
.step-source {
  font-family:'DM Mono',monospace;font-size:9px;padding:2px 7px;
  border-radius:100px;border:1px solid var(--border-strong);
  color:var(--ink-60);text-decoration:none;transition:background .15s;
  letter-spacing:.05em;
}
.step-source:hover { background:var(--border-strong);color:var(--ink); }

/* Connecting mini-icons row */
.flow-mini {
  display:flex;
  align-items:center;
  gap:0;
  padding:0 32px 20px;
  overflow-x:auto;
}
.flow-mini-item {
  display:flex;flex-direction:column;align-items:center;gap:6px;flex-shrink:0;
}
.flow-mini-circle {
  width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;
}
.flow-mini-label {
  font-family:'DM Mono',monospace;font-size:9px;
  letter-spacing:.08em;text-transform:uppercase;
  color:var(--ink-60);text-align:center;max-width:52px;line-height:1.3;
}
.flow-mini-arrow {
  width:32px;height:2px;flex-shrink:0;
  position:relative;margin:0 4px;
  background:var(--border-strong);
}
.flow-mini-arrow::after {
  content:'';position:absolute;right:-5px;top:-4px;
  border:5px solid transparent;
  border-left-color:var(--border-strong);
}

@media (max-width:700px) {
  .main-wrap { padding:40px 20px 60px; }
  .page-header { padding:36px 24px 32px; }
  .phase-row { grid-template-columns:48px 1fr; gap:0 16px; }
  .sub-steps { grid-template-columns:1fr; }
}
</style>
</head>
<body>

<header class="page-header">
  <div class="page-header-inner">
    <div class="option-label">Option B</div>
    <h1>Fiber to <em>Garment</em></h1>
    <p>Five phases from raw material to finished clothing. Click any phase to expand the process steps.</p>
  </div>
</header>

<main class="main-wrap" id="main-wrap">
  <!-- Injected by JS -->
</main>

<script>
const phases = [
  {
    id:'sourcing', number:1, name:'Fiber Sourcing', accent:'#5A7A60', accentLight:'#EEF4EF',
    icon:'🌱',
    miniFlow:[
      {emoji:'🌿',label:'Cotton\nBoll'},{arrow:true},{emoji:'🐑',label:'Shear\nSheep'},{arrow:true},{emoji:'🐛',label:'Silk\nCocoon'},{arrow:true},{emoji:'⚗️',label:'Polymer\nMelt'},{arrow:true},{emoji:'🌲',label:'Wood\nPulp'}
    ],
    summary:'The journey begins by extracting or synthesizing the raw materials that will eventually become thread, then fabric.',
    steps:[
      { sub:'01', title:'Plant (Cellulosic)', body:'Cotton fibers are harvested from bolls. Flax stems are retted — soaked in water — to create linen. Hemp fibers are stripped from stalks. All three are pure cellulose.', sources:[{l:'ACS: Fiber to Fabric',u:'https://www.acs.org/education/celebrating-chemistry-editions/2022-ncw/fiber-to-fabric.html'},{l:'Ecosilky',u:'https://www.ecosilky.com.vn/en/which-natural-materials-are-used-to-obtain-fibres/'}] },
      { sub:'02', title:'Animal (Protein)', body:'Wool is sheared from sheep. Silk is unraveled from silkworm cocoons — one cocoon yields up to 1,500 m of thread. Cashmere and mohair are combed from the undercoats of goats.', sources:[{l:'ACS: Fiber to Fabric',u:'https://www.acs.org/education/celebrating-chemistry-editions/2022-ncw/fiber-to-fabric.html'}] },
      { sub:'03', title:'Synthetic (Petrochemical)', body:'Polymers like PET and nylon are synthesized from petroleum chemicals, melted, and extruded through a spinneret to form continuous filaments. No farming required — but fossil fuel dependent.', sources:[{l:'Fibreguard: Polyester',u:'https://fibreguard.com/sell/blog/the-ins-and-outs-of-polyester-fibres-and-fabrics'}] },
      { sub:'04', title:'Regenerated (Semi-Synthetic)', body:'Wood pulp (from eucalyptus, beech, bamboo) is chemically dissolved and re-extruded as fiber. Creates rayon, modal, and lyocell (TENCEL™). Plant-origin, chemically processed.', sources:[{l:'Goyal Textiles',u:'https://thegoyaltextiles.com/blog/the-journey-of-fabric-from-fiber-to-fashion/'},{l:'Artisan Stitch',u:'https://www.artisanstitch.co.uk/man-made-fibres/'}] },
    ]
  },
  {
    id:'spinning', number:2, name:'Yarn Spinning', accent:'#B8860B', accentLight:'#FDF4DC',
    icon:'🧵',
    miniFlow:[
      {emoji:'🌀',label:'Open\n& Clean'},{arrow:true},{emoji:'🪮',label:'Card\n& Draw'},{arrow:true},{emoji:'🌪️',label:'Draft\n& Twist'},{arrow:true},{emoji:'🧶',label:'Finished\nYarn'}
    ],
    summary:'Raw fibers are transformed into long, continuous, workable threads called yarn.',
    steps:[
      { sub:'01', title:'Opening & Cleaning', body:'Bales of raw fiber are loosened and passed through opening machines that remove impurities — seeds, vegetable matter, dust. The fiber emerges as a fluffy cloud called a lap.' },
      { sub:'02', title:'Carding & Drawing', body:'The lap is combed through fine wire rollers to align fibers into a continuous rope called a sliver. Multiple slivers are then drawn and combined to improve evenness.', sources:[{l:'Toyota Industries',u:'https://www.toyota-industries.com/products/relation/textile_process/'}] },
      { sub:'03', title:'Drafting & Twisting', body:'The sliver is progressively thinned and twisted on a spinning frame. Twisting binds fibers together through friction. More twist = stronger but stiffer yarn; less = softer but weaker.' },
      { sub:'04', title:'Filament vs. Spun Yarn', body:'Synthetic fibers can be used as-is (long, smooth filament yarn), or cut and re-spun to mimic the texture of natural fibers. Air-jet texturizing adds bulk and softness.', sources:[{l:'ACS: Fiber to Fabric',u:'https://www.acs.org/education/celebrating-chemistry-editions/2022-ncw/fiber-to-fabric.html'}] },
    ]
  },
  {
    id:'construction', number:3, name:'Fabric Construction', accent:'#4A6B8A', accentLight:'#EEF3F8',
    icon:'🪡',
    miniFlow:[
      {emoji:'⬛',label:'Greige\nCloth'},{arrow:true},{emoji:'🕸️',label:'Weave\n(Loom)'},{arrow:true},{emoji:'🔄',label:'Knit\n(Loops)'},{arrow:true},{emoji:'🔲',label:'Non-\nWoven'}
    ],
    summary:'Yarn is interlaced, looped, or bonded to create usable fabric — called "greige cloth" before dyeing.',
    steps:[
      { sub:'01', title:'Weaving', body:'A loom interlaces two perpendicular yarns: warp (lengthwise) and weft (crosswise). The three fundamental structures — plain, twill, satin — produce stable, non-stretch fabrics of varying drape and durability.', sources:[{l:'Scribd: Types of Fabrics',u:'https://www.scribd.com/document/469107812/Types-of-Fabrics'}] },
      { sub:'02', title:'Knitting', body:'A single continuous yarn is interlooped using needles on industrial machines. The loop structure creates natural stretch and comfort. Jersey, rib, interlock, and French terry are all knit constructions.', sources:[{l:'Scribd: Types of Fabrics',u:'https://www.scribd.com/document/469107812/Types-of-Fabrics'}] },
      { sub:'03', title:'Non-Woven', body:'Fibers are bonded directly into a sheet — without spinning or weaving. Methods include needle-punching (mechanical), heat fusing (thermal), and adhesives (chemical). Examples: felt, interfacing, medical fabrics.' },
    ]
  },
  {
    id:'wetprocessing', number:4, name:'Wet Processing', accent:'#C1622A', accentLight:'#FBF0E8',
    icon:'🎨',
    miniFlow:[
      {emoji:'🫧',label:'Scour\n& Clean'},{arrow:true},{emoji:'⬜',label:'Bleach'},{arrow:true},{emoji:'🎨',label:'Dye\n& Print'},{arrow:true},{emoji:'✨',label:'Finish\n& Coat'}
    ],
    summary:'Greige cloth undergoes chemical and mechanical treatments to clean, colour, and finish it for garment use.',
    steps:[
      { sub:'01', title:'Desizing & Scouring', body:'Greige cloth contains sizing agents (starches), natural waxes, and oils. Desizing removes the starch; scouring uses alkaline detergents at high temperature to clean the fabric, leaving it absorbent and ready for dyeing.', sources:[{l:'Fadfay: Stages in Textiles',u:'https://fadfay.com/blogs/blogs/what-are-the-stages-in-textiles-from-scratch-to-end-product-a-comprehensive-guide'}] },
      { sub:'02', title:'Bleaching', body:'Natural fibers have a yellowish tint. Hydrogen peroxide bleaching removes natural pigments to produce a clean white base — critical for achieving consistent, accurate colors in the dyeing step.' },
      { sub:'03', title:'Dyeing & Printing', body:'Piece dyeing (submerging the whole roll) produces solid color. Screen or digital printing applies patterns. Yarn-dyed fabrics like denim are woven from pre-colored yarns for structural pattern effects.', sources:[{l:'Global Textile Times',u:'https://www.globaltextiletimes.com/textile/key-insights-into-the-global-textile-industry-today/'}] },
      { sub:'04', title:'Finishing', body:'Functional coatings are applied: DWR (water-repellency), resin (wrinkle-resistance), mercerizing (cotton luster and dye uptake), calendering (smooth sheen via heated rollers), enzymatic softening.', sources:[{l:'Juniper Publishers',u:'https://juniperpublishers.com/ctftte/CTFTTE.MS.ID.555601.php'}] },
    ]
  },
  {
    id:'assembly', number:5, name:'Garment Assembly', accent:'#8B5A7A', accentLight:'#F6EFF4',
    icon:'✂️',
    miniFlow:[
      {emoji:'📐',label:'Grade\nPattern'},{arrow:true},{emoji:'✂️',label:'Cut\nFabric'},{arrow:true},{emoji:'🪡',label:'Sew\nPieces'},{arrow:true},{emoji:'🏷️',label:'QC &\nPackage'}
    ],
    summary:'The finished textile becomes a wearable garment through grading, cutting, sewing, and quality control.',
    steps:[
      { sub:'01', title:'Grading & Marking', body:'A base pattern is graded mathematically across a size range. Nested patterns are digitally optimized on the fabric (marking) to maximize yield and minimize waste. Efficiency directly impacts cost and sustainability.', sources:[{l:'Fadfay: Stages in Textiles',u:'https://fadfay.com/blogs/blogs/what-are-the-stages-in-textiles-from-scratch-to-end-product-a-comprehensive-guide'}] },
      { sub:'02', title:'Cutting', body:'Fabric is spread in multiple layers (a "lay") and cut through all layers with straight knives, band knives, or CNC cutters. A 1 mm error multiplied across thousands of garments creates significant waste.', sources:[{l:'Kute Tailor',u:'https://www.kutetailor.com/blog/the-ultimate-definitive-guide-to-clothing-manufacturing.html'}] },
      { sub:'03', title:'Sewing & Assembly', body:'Each operator performs one or two specific stitch types in a production line. Lockstitch, overlock, coverstitch — different seams for different fabrics. A single garment may require 20–100+ individual operations.', sources:[{l:'Common Objective',u:'https://www.commonobjective.co/article/apparel-production-fibre-to-fabric-to-fashion'}] },
      { sub:'04', title:'Finishing, QC & Packaging', body:'Buttons, zippers, labels, and tags are attached. Garments are pressed, steamed, and inspected against technical specifications. Passing pieces are folded or hung, tagged, and packaged for distribution.', sources:[{l:'Common Objective',u:'https://www.commonobjective.co/article/apparel-production-fibre-to-fabric-to-fashion'}] },
    ]
  },
];

function render() {
  const wrap = document.getElementById('main-wrap');
  wrap.innerHTML = '';

  phases.forEach((phase, pi) => {
    const row = document.createElement('div');
    row.className = 'phase-row';

    // Spine
    const spine = document.createElement('div');
    spine.className = 'spine-col';
    spine.innerHTML = `
      <div class="spine-number" style="background:${phase.accent};">${phase.number}</div>
      <div class="spine-line${pi===phases.length-1?' last':''}"></div>
    `;

    // Card
    const card = document.createElement('div');
    card.className = 'phase-card';

    // Mini flow row
    let miniHTML = '';
    if (phase.miniFlow) {
      miniHTML = `<div class="flow-mini">
        ${phase.miniFlow.map(item => item.arrow
          ? `<div class="flow-mini-arrow"></div>`
          : `<div class="flow-mini-item">
               <div class="flow-mini-circle" style="background:${phase.accentLight}">${item.emoji}</div>
               <span class="flow-mini-label">${item.label.replace('\n','<br>')}</span>
             </div>`
        ).join('')}
      </div>`;
    }

    // Steps
    const stepsHTML = phase.steps.map((s,si) => {
      const srcHTML = s.sources
        ? `<div class="step-sources">${s.sources.map(src=>`<a class="step-source" href="${src.u}" target="_blank" rel="noopener">${src.l} ↗</a>`).join('')}</div>`
        : '';
      return `<div class="step-tile">
        <div class="step-tile-num">Step ${s.sub}</div>
        <div class="step-tile-title" style="color:${phase.accent}">${s.title}</div>
        <p class="step-tile-body">${s.body}</p>
        ${srcHTML}
      </div>`;
    }).join('');

    card.innerHTML = `
      <div class="phase-card-header" onclick="togglePhase('steps-${phase.id}','btn-${phase.id}')">
        <div class="phase-icon-wrap" style="background:${phase.accentLight}">
          <span style="font-size:26px">${phase.icon}</span>
        </div>
        <div class="phase-header-text">
          <div class="phase-title">${phase.name}</div>
          <div class="phase-summary-short">${phase.summary}</div>
        </div>
        <button class="expand-btn" id="btn-${phase.id}" aria-label="Expand ${phase.name}">▾</button>
      </div>
      ${miniHTML}
      <div class="sub-steps" id="steps-${phase.id}">
        ${stepsHTML}
      </div>
    `;

    row.appendChild(spine);
    row.appendChild(card);
    wrap.appendChild(row);
  });
}

function togglePhase(stepsId, btnId) {
  const steps = document.getElementById(stepsId);
  const btn = document.getElementById(btnId);
  const isOpen = steps.classList.contains('open');
  steps.classList.toggle('open', !isOpen);
  btn.classList.toggle('open', !isOpen);
}

render();
</script>
</body>
</html>
