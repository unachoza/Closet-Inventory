version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      # Bundle routine patch/minor bumps into one PR instead of 20 separate
      # ones; security advisories still open their own PR immediately.
      dev-dependencies:
        applies-to: version-updates
        update-types: ["minor", "patch"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
